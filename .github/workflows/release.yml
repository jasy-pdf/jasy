name: Release

# Triggered by the tags that scripts/release.sh pushes - one tag releases exactly one package.
on:
  push:
    tags:
      - "pdf-v*"
      - "zugferd-v*"
      - "cli-v*"

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package from the tag
        id: pkg
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            pdf-v*)     DIR="."                 ; NAME="@jasy/pdf"     ; VER="${TAG#pdf-v}" ;;
            zugferd-v*) DIR="packages/zugferd"  ; NAME="@jasy/zugferd" ; VER="${TAG#zugferd-v}" ;;
            cli-v*)     DIR="packages/cli"      ; NAME="@jasy/cli"     ; VER="${TAG#cli-v}" ;;
            *) echo "Unknown tag: $TAG" ; exit 1 ;;
          esac
          { echo "dir=$DIR"; echo "name=$NAME"; echo "version=$VER"; } >> "$GITHUB_OUTPUT"

      # build the target AND its workspace dependencies ("<name>..."), so e.g. @jasy/zugferd has
      # @jasy/pdf's dist available when it compiles - nothing unrelated is built.
      - name: Build
        run: pnpm --filter "${{ steps.pkg.outputs.name }}..." build

      - name: Test (never ship a red build)
        run: pnpm exec vitest run

      - name: Publish
        working-directory: ${{ steps.pkg.outputs.dir }}
        # pnpm rewrites the workspace:* deps to real versions on publish
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: >
          gh release create "${{ github.ref_name }}"
          --title "${{ steps.pkg.outputs.name }} ${{ steps.pkg.outputs.version }}"
          --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
